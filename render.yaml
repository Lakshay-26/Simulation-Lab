services:
  - type: web
    name: security-sim-api
    env: node
    plan: free
    buildCommand: npm install --prefix backend
    startCommand: node backend/index.js
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.12.0

  - type: web
    name: security-sim-frontend
    runtime: static
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: security-sim-api
          type: web
          property: host
      - key: NODE_VERSION
        value: 22.12.0
